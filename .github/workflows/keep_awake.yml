name: Keep Streamlit App Awake

on:
  schedule:
    - cron: "0 */3 * * *"  # Runs every 3 hours
  workflow_dispatch:       # Allows you to trigger it manually if needed

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create or update timestamp file
        run: |
          mkdir -p .streamlit_keepalive
          echo "$(date)" > .streamlit_keepalive/timestamp.txt

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .streamlit_keepalive/timestamp.txt
          git commit -m "Automated commit to keep Streamlit app awake" || exit 0
          git push
